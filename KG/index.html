<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart KG — F2 运动模块决策流程</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8; --surface: #fff; --border: #e2e8f0;
      --text: #1a202c; --muted: #718096;
      --ok: #52b788; --review: #d97706; --none: #dc2626;
      --r: 10px;
    }
    body { font-family:'PingFang SC','Microsoft YaHei',sans-serif;
           background:var(--bg); color:var(--text); font-size:14px; line-height:1.6; }

    /* ── layout ── */
    .shell { display:grid; grid-template-rows:52px 1fr;
             grid-template-columns:360px 1fr;
             grid-template-areas:"hd hd""sb main"; min-height:100vh; }

    /* ── header ── */
    header { grid-area:hd; background:#1d3557; color:#fff;
             display:flex; align-items:center; gap:16px; padding:0 22px; }
    header h1 { font-size:15px; font-weight:700; }
    header .sub { font-size:11px; color:#a8dadc; margin-left:6px; }
    .hd-stats { margin-left:auto; display:flex; gap:14px; font-size:11px; }
    .hd-stat { display:flex; align-items:center; gap:4px; }
    .hd-dot { width:7px; height:7px; border-radius:50%; }

    /* ── sidebar ── */
    aside { grid-area:sb; background:var(--surface);
            border-right:1px solid var(--border); overflow-y:auto;
            display:flex; flex-direction:column; }

    .sb-filter { padding:9px 14px; border-bottom:1px solid var(--border);
                 display:flex; gap:5px; flex-wrap:wrap; background:#f8fafc; flex-shrink:0; }
    .filter-btn { padding:3px 9px; border-radius:20px; border:1px solid var(--border);
                  background:transparent; font-size:11px; cursor:pointer; color:var(--muted);
                  font-family:inherit; transition:all .15s; }
    .filter-btn:hover { border-color:#718096; color:var(--text); }
    .filter-btn.active { background:#1d3557; color:#fff; border-color:#1d3557; }

    /* ── tree ── */
    .tree-wrap { flex:1; overflow-y:auto; padding:14px 12px 28px; }

    /* start node */
    .tree-start { display:flex; align-items:center; gap:9px;
                  padding:9px 12px; background:#1d3557; border-radius:8px;
                  color:#fff; font-weight:700; font-size:13px; margin-bottom:0; }
    .start-arrow { font-size:11px; opacity:.7; }

    /* phase block */
    .phase-block { display:flex; align-items:stretch; margin-top:0; }
    .phase-spine { display:flex; flex-direction:column; align-items:center;
                   width:28px; flex-shrink:0; }
    .spine-line { width:2px; background:#d1d9e6; flex:1; min-height:6px; }
    .phase-num { width:22px; height:22px; border-radius:50%;
                 background:#2d3748; border:2px solid #e2e8f0;
                 display:flex; align-items:center; justify-content:center;
                 font-size:10px; font-weight:700; color:#fff; flex-shrink:0; z-index:1; }
    .phase-body { flex:1; padding-left:8px; padding-bottom:4px; min-width:0; }

    .phase-hd { display:flex; align-items:center; gap:7px;
                padding:5px 7px; border-radius:6px; cursor:pointer;
                user-select:none; transition:background .15s; }
    .phase-hd:hover { background:#f3f6fa; }
    .phase-name { font-size:13px; font-weight:700; color:#2d3748; flex:1; }
    .phase-desc { font-size:10px; color:var(--muted); margin-top:1px; }
    .ph-chevron { font-size:9px; color:var(--muted); transition:transform .18s; flex-shrink:0; }
    .ph-chevron.open { transform:rotate(90deg); }

    /* branches */
    .branches { display:none; padding-left:6px; padding-bottom:6px;
                border-left:2px solid #e8edf2; margin-left:3px; }
    .branches.open { display:block; }

    /* branch */
    .branch { margin-top:5px; }
    .branch-hd { display:flex; align-items:center; gap:6px;
                 padding:4px 8px 4px 12px; border-radius:5px;
                 cursor:pointer; user-select:none; font-size:12px;
                 font-weight:600; color:#4a5568; position:relative;
                 transition:background .15s; }
    .branch-hd::before { content:''; position:absolute; left:-2px; top:50%;
                          width:10px; height:2px; background:#d1d9e6; }
    .branch-hd:hover { background:#f3f6fa; color:#1a202c; }
    .branch-hd.reduce { color:#c53030; }
    .branch-hd.increase { color:#276749; }
    .branch-hd.reduce:hover { background:#fff5f5; }
    .branch-hd.increase:hover { background:#f0fff4; }
    .br-chevron { font-size:9px; transition:transform .18s; margin-left:auto; flex-shrink:0; }
    .br-chevron.open { transform:rotate(90deg); }
    .br-count { font-size:10px; font-weight:400; color:var(--muted); }

    /* rule list */
    .rule-list { display:none; padding-left:14px; margin-top:2px;
                 border-left:1px dashed #d1d9e6; margin-left:8px; }
    .rule-list.open { display:block; }

    .rule-btn { display:flex; align-items:flex-start; gap:6px;
                width:100%; padding:4px 6px; border:none; background:transparent;
                cursor:pointer; text-align:left; border-radius:4px;
                font-size:11.5px; color:#4a5568; line-height:1.4;
                font-family:inherit; margin-top:2px;
                transition:background .12s; position:relative; }
    .rule-btn::before { content:''; position:absolute; left:-8px; top:10px;
                        width:7px; height:1px; background:#d1d9e6; }
    .rule-btn:hover { background:#f3f6fa; color:#1a202c; }
    .rule-btn.active { background:#ebf8ff; color:#2b6cb0; font-weight:600; }
    .rule-btn.hidden { display:none; }
    .r-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px; }

    /* ── main panel ── */
    main { grid-area:main; padding:26px; overflow-y:auto; }

    .card { background:var(--surface); border:1px solid var(--border);
            border-radius:var(--r); overflow:hidden; margin-bottom:20px; }
    .card-hd { padding:13px 18px; border-bottom:1px solid var(--border);
               display:flex; align-items:center; gap:10px; }
    .card-title { font-size:11px; font-weight:700; text-transform:uppercase;
                  letter-spacing:.8px; color:var(--muted); }
    .card-body { padding:18px; }

    .meta-bar { display:flex; flex-wrap:wrap; align-items:flex-start;
                gap:10px; margin-bottom:20px; }
    .rule-title { font-size:17px; font-weight:700; flex:1 1 280px; }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px;
             border-radius:20px; font-size:12px; font-weight:600; white-space:nowrap; }
    .badge-group  { background:#faf5ff; color:#553c9a; }
    .badge-module { background:#ebf8ff; color:#2b6cb0; }
    .badge-ok     { background:#c6f6d5; color:#276749; }
    .badge-review { background:#fef3c7; color:#92400e; }
    .badge-none   { background:#fee2e2; color:#991b1b; }

    .graph-wrap { overflow-x:auto; padding:8px 0 4px; }
    svg.graph { display:block; min-width:780px; }

    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media(max-width:1060px){ .detail-grid{grid-template-columns:1fr;} }

    .field-group { margin-bottom:13px; }
    .field-label { font-size:11px; font-weight:700; text-transform:uppercase;
                   letter-spacing:.8px; color:var(--muted); margin-bottom:4px; }
    .field-value { font-size:14px; }
    .field-pre { font-size:13px; color:#4a5568; white-space:pre-wrap; line-height:1.7; }
    .field-tag { display:inline-block; background:#edf2f7; color:#4a5568;
                 border-radius:4px; padding:2px 8px; font-size:12px; margin:2px 2px 2px 0; }
    .affects-list { list-style:none; }
    .affects-list li { padding:5px 0 5px 16px; border-bottom:1px dashed var(--border);
                       position:relative; font-size:13px; color:#4a5568; }
    .affects-list li::before { content:'→'; position:absolute; left:0; color:#276749; }

    .ev-item { padding:13px; border:1px solid var(--border); border-radius:8px;
               margin-bottom:9px; position:relative; }
    .ev-item:last-child { margin-bottom:0; }
    .ev-cite { font-weight:600; font-size:13px; margin-bottom:5px; padding-right:68px; line-height:1.4; }
    .ev-find { font-size:13px; color:#4a5568; line-height:1.65; }
    .ev-conf { position:absolute; top:13px; right:13px; font-size:11px; font-weight:700;
               padding:2px 8px; border-radius:20px; }
    .ev-conf-high   { background:#c6f6d5; color:#276749; }
    .ev-conf-medium { background:#fef3c7; color:#92400e; }
    .ev-conf-low    { background:#fee2e2; color:#991b1b; }

    .notes-box { background:#fffbeb; border:1px solid #fcd34d; border-radius:8px;
                 padding:12px 16px; font-size:13px; color:#78350f; line-height:1.7; }
    .notes-empty { color:var(--muted); font-style:italic; font-size:13px; }

    .empty-state { display:flex; flex-direction:column; align-items:center;
                   justify-content:center; min-height:60vh; color:var(--muted); }
    .empty-state .arrow { font-size:40px; opacity:.3; }
    .empty-state p { margin-top:10px; font-size:15px; }
    .empty-state small { margin-top:6px; font-size:12px; opacity:.7; }

    .legend { display:flex; flex-wrap:wrap; gap:14px; font-size:12px; color:var(--muted); }
    .legend-item { display:flex; align-items:center; gap:5px; }
    .legend-dot { width:10px; height:10px; border-radius:3px; }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <h1>Heart 决策知识图谱<span class="sub">F2 运动模块 · KG v0.3</span></h1>
    <div class="hd-stats" id="hd-stats"></div>
  </header>

  <aside>
    <div class="sb-filter">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="evidence_ok">✓ 依据充分</button>
      <button class="filter-btn" data-filter="needs_review">⚠ 待补充</button>
      <button class="filter-btn" data-filter="no_evidence">✗ 无依据</button>
    </div>
    <div class="tree-wrap" id="tree-wrap"></div>
  </aside>

  <main id="main-content">
    <div class="empty-state">
      <div class="arrow">←</div>
      <p>从左侧流程树选择一条规则</p>
      <small>展开分支节点，点击叶子规则查看详情</small>
    </div>
  </main>

</div>

const STATUS_MAP = {
  evidence_ok:  { cls:'badge-ok',    dot:'#52b788', label:'✓ 依据充分' },
  needs_review: { cls:'badge-review',dot:'#d97706', label:'⚠ 待补充'  },
  no_evidence:  { cls:'badge-none',  dot:'#dc2626', label:'✗ 无依据'  }
};
const CONF_MAP = { high:'高置信', medium:'中置信', low:'低置信' };
const TYPE_LABEL = { patient_attribute:'患者属性', threshold:'数值阈值', sequence:'连续事件', composite:'复合条件' };
const ACTION_LABEL = { behavior_override:'行为覆盖', lock:'功能锁定', alert:'弹出预警', suggest:'推送建议', force:'强制执行' };

let currentFilter = 'all';
let currentId     = null;
const phaseOpen   = {};
const branchOpen  = {};
TREE.forEach(p => {
  phaseOpen[p.id] = !!p.defaultOpen;
  p.branches.forEach(b => { branchOpen[b.id] = !!b.defaultOpen; });
});

const ruleMap = {};
RULES.forEach(r => ruleMap[r.id] = r);

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const c = { evidence_ok:0, needs_review:0, no_evidence:0 };
  RULES.forEach(r => c[r.status] = (c[r.status]||0) + 1);
  document.getElementById('hd-stats').innerHTML =
    `<div class="hd-stat"><div class="hd-dot" style="background:#52b788"></div>依据充分 ${c.evidence_ok}</div>`+
    `<div class="hd-stat"><div class="hd-dot" style="background:#d97706"></div>待补充 ${c.needs_review}</div>`+
    `<div class="hd-stat"><div class="hd-dot" style="background:#a0aec0"></div>共 ${RULES.length} 条规则</div>`;
}

// ── Tree render ───────────────────────────────────────────────────────────────
function renderTree() {
  let html = `<div class="tree-start"><span class="start-arrow">▶</span>用户开始运动</div>`;

  TREE.forEach((phase, pi) => {
    const pOpen = phaseOpen[phase.id];
    const isLast = pi === TREE.length - 1;

    html += `
      <div class="phase-block">
        <div class="phase-spine">
          <div class="spine-line"></div>
          <div class="phase-num">${phase.num}</div>
          ${!isLast || pOpen ? `<div class="spine-line"></div>` : ''}
        </div>
        <div class="phase-body">
          <div class="phase-hd" onclick="togglePhase('${phase.id}')">
            <div>
              <div class="phase-name">${phase.label}</div>
              <div class="phase-desc">${phase.desc}</div>
            </div>
            <span class="ph-chevron ${pOpen?'open':''}">▶</span>
          </div>
          <div class="branches ${pOpen?'open':''}" id="phase-${phase.id}">
    `;

    phase.branches.forEach(branch => {
      const bOpen = branchOpen[branch.id];
      const visible = branch.ruleIds.filter(id => {
        const r = ruleMap[id];
        return r && (currentFilter === 'all' || r.status === currentFilter);
      });
      const total = branch.ruleIds.length;
      const typeClass = branch.type ? branch.type : '';

      html += `
        <div class="branch">
          <div class="branch-hd ${typeClass}" onclick="toggleBranch('${branch.id}')">
            <span>${branch.label}</span>
            <span class="br-count">${visible.length}/${total}</span>
            <span class="br-chevron ${bOpen?'open':''}">▶</span>
          </div>
          <div class="rule-list ${bOpen?'open':''}" id="branch-${branch.id}">
      `;

      branch.ruleIds.forEach(rid => {
        const r = ruleMap[rid];
        if (!r) return;
        const s = STATUS_MAP[r.status] || STATUS_MAP.needs_review;
        const isFiltered = currentFilter !== 'all' && r.status !== currentFilter;
        const isActive = currentId === rid;
        html += `
          <button class="rule-btn ${isActive?'active':''} ${isFiltered?'hidden':''}"
                  onclick="showRule('${rid}')">
            <span class="r-dot" style="background:${s.dot}"></span>
            <span>${r.label}</span>
          </button>
        `;
      });

      html += `</div></div>`;
    });

    html += `</div></div></div>`;
  });

  document.getElementById('tree-wrap').innerHTML = html;
}

function togglePhase(id) {
  phaseOpen[id] = !phaseOpen[id];
  renderTree();
}

function toggleBranch(id) {
  branchOpen[id] = !branchOpen[id];
  renderTree();
}

// ── Filter ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTree();
  });
});

// ── Graph ─────────────────────────────────────────────────────────────────────

  const edgeLabel = ACTION_LABEL[r.action.type]||r.action.type;
  return `<svg class="graph" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#718096"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,.08)"/></filter>
  </defs>
  <rect x="${TX}" y="${TY}" width="${TW}" height="${TH}" rx="10" fill="#2b6cb0" filter="url(#sh)"/>
  <text x="${TX+TW/2}" y="${TY+18}" text-anchor="middle"
        font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="10" fill="rgba(255,255,255,.7)" font-weight="600" letter-spacing="1">触发条件 · ${TYPE_LABEL[r.trigger.type]||r.trigger.type}</text>
  <foreignObject x="${TX+8}" y="${TY+24}" width="${TW-16}" height="36">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:PingFang SC,Microsoft YaHei,sans-serif;font-size:12px;color:#fff;line-height:1.4;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${r.trigger.condition}</div>
  </foreignObject>
  <text x="${TX+TW/2}" y="${TY+TH+15}" text-anchor="middle"
        font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#718096">来源：${r.trigger.source}</text>
  <line x1="${TX+TW+8}" y1="${H/2}" x2="${AX-8}" y2="${H/2}" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="${midX-55}" y="${H/2-20}" width="110" height="22" rx="11" fill="#edf2f7"/>
  <text x="${midX}" y="${H/2-5}" text-anchor="middle"
        font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#4a5568" font-weight="600">${edgeLabel}</text>
  <rect x="${AX}" y="${AY}" width="${AW}" height="${AH}" rx="10" fill="#276749" filter="url(#sh)"/>
  <text x="${AX+AW/2}" y="${AY+18}" text-anchor="middle"
        font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="10" fill="rgba(255,255,255,.7)" font-weight="600" letter-spacing="1">执行动作</text>
  <foreignObject x="${AX+8}" y="${AY+24}" width="${AW-16}" height="36">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:PingFang SC,Microsoft YaHei,sans-serif;font-size:12px;color:#fff;line-height:1.4;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${r.action.description.substring(0,60)}…</div>
  </foreignObject>
</svg>`;
}

          <div class="card-hd"><span class="card-title">执行动作</span></div>
          <div class="card-body">
            <div class="field-group"><div class="field-label">类型</div><span class="field-tag">${ACTION_LABEL[r.action.type]||r.action.type}</span></div>
            <div class="field-group"><div class="field-label">动作描述</div><div class="field-pre">${r.action.description}</div></div>
            <div class="field-group"><div class="field-label">影响范围</div><ul class="affects-list">${affectsHTML}</ul></div>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-hd"><span class="card-title">文献依据</span><span style="margin-left:auto;font-size:12px;color:var(--muted)">${r.evidence.length} 条</span></div>
          <div class="card-body">${evHTML}</div>
        </div>
        <div class="card">
          <div class="card-hd"><span class="card-title">PM 备注</span></div>
          <div class="card-body">${notesHTML}</div>
        </div>
        <div style="font-size:11px;color:var(--muted);padding:6px 4px;">规则 ID：${r.id}</div>
      </div>
    </div>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderStats();
renderTree();
</script>
</body>
</html>
